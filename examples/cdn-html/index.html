<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stisla — CDN smoke</title>

  <!-- Pinned to a beta; bump to @3 once a stable lands -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stisla/css@3.0.0-beta.1/dist/stisla.css" />
  <script type="importmap">
      {
        "imports": {
          "@floating-ui/dom": "https://cdn.jsdelivr.net/npm/@floating-ui/dom@1.7.6/+esm",
          "focus-trap": "https://cdn.jsdelivr.net/npm/focus-trap@8.2.1/+esm",
          "tabbable": "https://cdn.jsdelivr.net/npm/tabbable@6.4.0/+esm"
        }
      }
    </script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@stisla/vanilla@3.0.0-beta.1/dist/stisla.js"></script>
  <!-- Lucide is UMD — must NOT be type="module" -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    body {
      max-width: 56rem;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    section+section {
      margin-top: 3rem;
    }

    .demo {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
  </style>
</head>

<body>
  <header>
    <h1 class="h1">Example with CDN</h1>
  </header>

  <section>
    <h2>Buttons</h2>
    <div class="demo">
      <button class="btn btn--primary">Primary</button>
      <button class="btn btn--outline btn--neutral">Secondary</button>
      <button class="btn btn--ghost btn--neutral">Ghost</button>
      <button class="btn btn--primary" disabled>Disabled</button>
    </div>
  </section>

  <section>
    <h2>Dialog</h2>
    <div class="demo">
      <button type="button" class="btn btn--primary" data-stisla-dialog-trigger="cdnDialog">
        Open dialog
      </button>
    </div>

    <div class="dialog" id="cdnDialog" data-stisla-dialog data-state="closed" role="dialog" aria-modal="true"
      aria-labelledby="cdnDialogLabel" aria-hidden="true" tabindex="-1">
      <div class="dialog__backdrop" data-stisla-dialog-dismiss></div>
      <div class="dialog__panel">
        <div class="dialog__content">
          <button type="button" class="dialog__close" data-stisla-dialog-dismiss aria-label="Close">
            <i data-lucide="x"></i>
          </button>
          <div class="dialog__header">
            <h3 class="dialog__title" id="cdnDialogLabel">Hello from the CDN</h3>
          </div>
          <div class="dialog__body">
            <p class="m-0">
              If you can see this dialog with backdrop, focus trap, and escape-to-close,
              the bundle is wired up.
            </p>
          </div>
          <div class="dialog__footer">
            <button type="button" class="btn btn--ghost btn--neutral" data-stisla-dialog-dismiss>
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>Dropdown</h2>
    <div class="demo">
      <div class="dropdown">
        <button type="button" class="btn btn--outline btn--neutral" data-stisla-dropdown-trigger="cdnDd"
          aria-haspopup="menu" aria-expanded="false" aria-controls="cdnDd">
          Open menu <i data-lucide="chevron-down"></i>
        </button>

        <div class="dropdown-menu" id="cdnDd" data-stisla-dropdown data-state="closed" role="menu">
          <button type="button" class="dropdown-menu__item" role="menuitem">Profile</button>
          <button type="button" class="dropdown-menu__item" role="menuitem">Settings</button>
          <hr class="dropdown-menu__divider" role="separator">
          <button type="button" class="dropdown-menu__item" role="menuitem">Sign out</button>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Lucide ships as UMD; render after DOM ready.
    window.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) window.lucide.createIcons();
    });
  </script>
</body>

</html>
