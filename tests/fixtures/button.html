<body>
  <!-- Representative tones. Every button carries text (accessible name); solid fills meet
       AA via the -emphasis token split, so documented classes are used as-is. -->
  <button type="button" class="button button--primary">Save changes</button>
  <button type="button" class="button button--outline button--neutral">Cancel</button>
  <button type="button" class="button button--danger">Delete</button>

</body>
