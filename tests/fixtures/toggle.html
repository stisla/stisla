<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fixture — toggle</title>
  <!-- BUILT bundles, same-origin (see scripts/serve-fixtures.mjs). Prereq: pnpm build:packages. -->
  <link rel="stylesheet" href="/packages/css/dist/stisla.css" />
  <link rel="stylesheet" href="/tests/fixtures/_fixture.css" />
</head>
<body>
  <!-- A neutral control before the toggle, so focus moves have a distinct wrong answer to fail on. -->
  <a href="#" class="fixture-before" id="before">a link before the toggle</a>

  <!-- Component under test: the JS-driven press-button toggle. Markup mirrors the documented
       recommended usage (docs/src/routes/docs/vanilla/toggle.tsx). The press wiring comes from
       stisla.js auto-init via data-stisla-toggle. Visible text gives the control its accessible name. -->
  <button type="button" class="toggle" id="toggle-basic" data-stisla-toggle aria-pressed="false">Notifications</button>

  <!-- Auto-initing IIFE: attaches window.Stisla and wires [data-stisla-*] on DOMContentLoaded. -->
  <script src="/packages/vanilla/dist/stisla.js"></script>
</body>
</html>
